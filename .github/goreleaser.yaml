version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: sigstore-kms-ovhcloud
    main: ./cmd/sigstore-kms-ovhcloud
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    binary: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}-{{ .Version }}"

archives:
  - formats: [ 'tar.gz' ]
    format_overrides:
      - goos: windows
        formats: [ 'zip' ]

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"

release:
  github:
    owner: ovh
    name: sigstore-kms-ovhcloud

  extra_files:
    - glob: install.sh

  footer: |

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser)
